<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
:root{--gold:#C5A47E;--bg:#F8F5F2}
body{margin:0;font-family:'Poppins',sans-serif;background:var(--bg);overflow-x:hidden}
h1,h2{font-family:'Playfair Display',serif}

/* 💎 Splash Welcome Card */
#splash{position:fixed;inset:0;background:#000;color:#fff;display:flex;align-items:center;justify-content:center;z-index:9999}
#inviteCard{background:rgba(255,255,255,0.1);backdrop-filter:blur(15px);padding:40px;border-radius:20px;text-align:center;animation:zoomIn 1.2s}
#openBtn{margin-top:20px}
@keyframes zoomIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}

/* ✨ Calligraphy */
.calligraphy{font-family:'Great Vibes',cursive;font-size:3rem;color:var(--gold);animation:fadeIn 2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

header{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;color:#fff;position:relative;background:url('static/Cover_1.jpeg') center/cover fixed}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.45)}
.content{position:relative;z-index:2}
.section{padding:70px 20px;text-align:center}
.card{background:rgba(255,255,255,0.2);backdrop-filter:blur(12px);padding:25px;margin:10px auto;max-width:420px;border-radius:20px;box-shadow:0 15px 40px rgba(0,0,0,.2)}
.countdown{font-size:2rem;color:var(--gold)}
button{background:var(--gold);color:#fff;border:none;padding:12px 25px;border-radius:25px;cursor:pointer;margin:10px}
.lang-toggle{position:fixed;top:20px;right:20px;z-index:10}
input,select{width:80%;padding:10px;margin:8px;border-radius:10px;border:1px solid #ccc}
.fade{opacity:0;transform:translateY(30px);transition:1s}.fade.show{opacity:1;transform:translateY(0)}
canvas{position:fixed;top:0;left:0;pointer-events:none}
.gallery{display:flex;overflow-x:auto;scroll-snap-type:x mandatory}
.gallery img{width:40%;margin:10px;border-radius:15px;scroll-snap-align:center}
#whatsappBtn{position:fixed;bottom:20px;right:20px;background:#25D366;display: none;}
#guestWelcome{font-size:1.2rem;margin-top:10px;color:#fff}
</style>
</head>
<body>

<!-- 💎 Welcome Card -->
<div id="splash">
  <div id="inviteCard">
    <h2 id="guestName">Welcome</h2>
    <p>Tap to open invitation</p>
    <button id="openBtn">Open Invitation</button>
  </div>
</div>

<div class="lang-toggle"><button onclick="toggleLang()">🌍 EN | தமிழ்</button></div>
<canvas id="petals"></canvas>

<header>
  <div class="overlay"></div>
  <div class="content">
    <h1 id="names" class="calligraphy"></h1>
    <p id="tagline"></p>
    <div class="countdown" id="countdown"></div>
  </div>
</header>

<section class="section fade">
  <h2 id="storyTitle"></h2>
  <p id="storyText"></p>
</section>

<section class="section fade">
  <h3 id="receptionTitle"></h3>
  <div class="card"><p id="receptionText"></p></div>
  <h3 id="eventTitle"></h3>
  <div class="card"><p id="eventText"></p></div>
  <button onclick="openMap()">📍 Open Location</button>
  <button onclick="addToCalendar()">🔔 Add to Calendar</button>
  <button onclick="downloadInvite()">🧾 Download Invite</button>
</section>

<section class="section fade gallery" id="gallery"></section>

<section class="section fade">
  <h2 id="rsvpTitle"></h2>
  <form id="rsvpForm">
    <input name="name" id="nameInput" required>
    <input name="phone" id="phoneInput" required>
    <select name="attending" id="attendSelect"></select><br>
    <button type="submit" id="submitBtn"></button>
  </form>
  <p id="msg"></p>
</section>

<button id="whatsappBtn" onclick="sendWhatsApp()">💌 Invite</button>

<audio id="bgm" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-love.mp3">
</audio>

<script>
let config={}, lang='en';

async function loadConfig(){
  const res = await fetch('config.json');
  config = await res.json();
  render(); initCountdown(); renderGallery(); personalize();
}

function render(){
  names.innerText=config.couple[lang];
  tagline.innerText=config.tagline[lang];
  storyTitle.innerText=config.story.title[lang];
  storyText.innerText=config.story.text[lang];
  eventTitle.innerText=config.event.title[lang];
  eventText.innerText=config.event.text[lang];
  receptionTitle.innerText=config.reception.title[lang];
  receptionText.innerText=config.reception.text[lang];
  rsvpTitle.innerText=config.rsvp.title[lang];
  nameInput.placeholder=config.rsvp.name[lang];
  phoneInput.placeholder=config.rsvp.phone[lang];
  submitBtn.innerText=config.rsvp.submit[lang];
  attendSelect.innerHTML=`<option>${config.rsvp.yes[lang]}</option><option>${config.rsvp.no[lang]}</option>`;
}

function toggleLang(){lang=lang==='en'?'ta':'en';render();}

function initCountdown(){
  const target = new Date(config.countdownDate);
  setInterval(()=>{
    const now=new Date();
    const d=target-now;
    const days=Math.floor(d/86400000);
    const hrs=Math.floor(d%86400000/3600000);
    const mins=Math.floor(d%3600000/60000);
    const secs = Math.floor((d % 60000) / 1000);
    countdown.innerText = `${days}d ${hrs}h ${mins}m ${secs}s`;
  },1000);
}

// 🧠 Personalization
function personalize(){
 const params=new URLSearchParams(window.location.search);
 const name=params.get('name');
 if(name){
   const formatted=name.charAt(0).toUpperCase()+name.slice(1);
   //guestWelcome.innerText = `Hi, ${formatted} ❤️`;
   guestName.innerText = `Hi, ${formatted} ❤️`;
  if(name == 'Sandy'){
    document.getElementById("whatsappBtn").style.display = "inline";
  }
 }
}

// 💎 Open splash
openBtn.onclick=()=>{
 splash.style.display='none';
 bgm.play();
}

// 📍 Google Maps
function openMap(){
 window.open(config.googleMap, '_blank');
}

// 🔔 Calendar
function addToCalendar(){
 const url=`https://www.google.com/calendar/render?action=TEMPLATE&text=Wedding&dates=20260617T073000/20260617T090000&details=Join us&location=${config.googleMap}`;
 window.open(url, '_blank');
}

// 🧾 Luxury PDF
function downloadInvite(){
 const win=window.open('','_blank');
 win.document.write(`
  <html>
  <head>
  <title>Wedding Invite</title>
  <style>
    body{font-family:'Playfair Display',serif;text-align:center;padding:60px;background:#f8f5f2}
    .card{border:4px solid #C5A47E;padding:40px;border-radius:20px}
    h1{font-size:40px;color:#C5A47E}
    p{font-size:18px}
  </style>
  </head>
  <body>
    <div class='card'>
      <h1>${config.couple.en}</h1>
      <p>${config.tagline.en}</p>
      <p>${config.event.text.en}</p>
      <p>With love ❤️</p>
    </div>
  </body>
  </html>
 `);
 win.document.close();
 win.print();
}

// Gallery
function renderGallery(){
 if(!config.gallery) return;
 gallery.innerHTML=config.gallery.map(img=>`<img src="${img}">`).join('');
}

// WhatsApp
function sendWhatsApp(){
 const name=prompt("Enter guest name");
 const url=window.location.origin+"/wedding-invitation/?name="+encodeURIComponent(name);
 const text=`Hey ${name}, you're invited for our wedding happening on ${config.event.text[lang]} \n${url}`;
 window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
}

// RSVP
document.getElementById('rsvpForm').addEventListener('submit', e=>{
 e.preventDefault();
 fetch(config.scriptURL,{method:'POST',body:new FormData(e.target)})
 .then(()=> msg.innerText=config.rsvp.success[lang])
 .catch(()=> msg.innerText='Error');
});

// Scroll
const observer=new IntersectionObserver(entries=>{
 entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('show')});
});
document.querySelectorAll('.fade').forEach(el=>observer.observe(el));

// Petals
const canvas=document.getElementById('petals');const ctx=canvas.getContext('2d');canvas.width=innerWidth;canvas.height=innerHeight;
let petals=[...Array(30)].map(()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:3+Math.random()*3,s:1+Math.random()*2}));
(function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);petals.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(197,164,126,0.6)';ctx.fill();p.y+=p.s;if(p.y>canvas.height)p.y=0});requestAnimationFrame(draw)})();

loadConfig();
</script>

</body>
</html>
