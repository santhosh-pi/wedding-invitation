<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Wedding Invitation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f2f2f2;
            margin: 0;
            color: #333;
        }
        .header {
            text-align: center;
            background: #4CAF50;
            color: white;
            padding: 10px 0;
            position: relative;
        }
        .header h1 {
            margin: 0;
        }
        .toggle { margin: 10px; }
        .details {
            display: flex;
            justify-content: space-around;
            padding: 20px;
        }
        .section {
            margin: 10px;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .rsvp {
            margin-top: 20px;
            text-align: center; 
        }
        @media (max-width: 600px) {
            .details {
                flex-direction: column;
            }
        }
        .animation {
            transition: all 0.3s ease;
        }
        .animation:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Cinematic Wedding Invitation</h1>
        <div class="toggle">
            <button onclick="toggleLanguage('en')">English</button>
            <button onclick="toggleLanguage('ta')">தமிழ்</button>
        </div>
    </div>
    <div class="details">
        <div class="section animation">
            <h2>Wedding Details</h2>
            <p>Join us for a beautiful celebration!</p>
            <p>Date: 2026-03-27</p>
            <p>Location: Venue Name, City</p>
            <p><a href="https://www.google.com/maps?q=Venue+Location" target="_blank">View on Map</a></p>
        </div>
        <div class="section animation">
            <h2>RSVP</h2>
            <div class="rsvp">
                <p>Please fill out our RSVP form:</p>
                <a href="https://docs.google.com/forms/d/e/1FAIpQLSfXXXXXXXXXXXXXXX/viewform" target="_blank">RSVP Form</a>
            </div>
        </div>
    </div>
    <script>
        function toggleLanguage(lang) {
            if(lang === 'en') {
                document.querySelector('h1').innerText = 'Cinematic Wedding Invitation';
                // update other texts to English
            } else {
                document.querySelector('h1').innerText = 'சினிமா திருமண அழைப்பு';
                // update other texts to Tamil
            }
        }
    </script>
</body>
</html>
